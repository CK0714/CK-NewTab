<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CK-NewTab 设置</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{
            padding:30px;
            width:420px;
            background:#fff;
        }
        h2{margin-bottom:20px;font-size:18px;color:#222;}
        .input-box{margin-bottom:16px;position:relative;}
        label{display:block;margin-bottom:6px;font-size:14px;color:#444;}

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: #2b78e4;
            box-shadow: 0 0 0 2px rgba(43, 120, 228, 0.1);
        }

        #prefixSelector {
            padding: 10px 8px;
            background: #f8f9fa;
            border-right: 1px solid #ddd;
            cursor: pointer;
            font-size: 14px;
            color: #2b78e4;
            user-select: none;
        }
        #prefixSelector:hover {background: #e9ecef;}

        #urlInput {
            flex: 1;
            padding: 10px 12px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button{
            padding: 10px 16px;
            background:#2b78e4;
            color:#fff;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size: 14px;
        }
        button:hover{background:#1e66c9;}

        .tip{margin-top:12px;font-size:12px;color:#666;line-height:1.5;}
    </style>
</head>
<body>
    <h2>CK-NewTab 自定义跳转地址</h2>

    <div class="input-box">
        <label>新标签页跳转网址或本地IP</label>
        <div class="input-wrapper">
            <div id="prefixSelector" title="点击切换协议前缀">https://</div>
            <input type="text" id="urlInput" placeholder="例如 www.bilibili.com 或 192.168.1.100">
        </div>
    </div>

    <button id="saveBtn">保存设置</button>
    <div class="tip">保存后打开新标签页将自动跳转该网址<br>支持公网域名、本地内网IP地址</div>

    <script src="options.js" defer></script>
</body>
</html>
